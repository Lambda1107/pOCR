name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build pOCR DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: uv sync

      - name: Build app
        run: make

      - name: Package DMG
        run: make package

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pOCR-dmg
          path: build/pOCR.dmg

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: pOCR-dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: pOCR ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "See [README](https://github.com/${{ github.repository }}) for usage."
          files: pOCR.dmg
          generate_release_notes: true
